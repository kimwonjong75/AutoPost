# config.yaml 템플릿 — 복사해서 실제 config.yaml 로 사용하세요 (cp config.example.yaml config.yaml)
# 실제 config.yaml 은 .gitignore 처리되어 커밋되지 않습니다.
# API 키·비밀번호는 여기(또는 config.yaml)가 아니라 secrets.yaml 에 넣으세요.
api_keys:
  openai: ''
  claude: ''
  gemini: ''
  replicate: ''
  ideogram: ''
defaults:
  text_engine: gemini
  text_model: gemini-3.1-flash-lite
  image_engine: gemini_flash_image
  image_quality: medium
  image_count: 3
  info_image_count: 2
  promo_image_count: 1
google_sheet:
  service_account_json: ./data/google-service-account.json
  sheet_id: ''
publish:
  inter_blog_delay:
  - 60
  - 180
  inter_post_delay:
  - 30
  - 90
  action_delay:
  - 1.5
  - 4.0
  max_retries: 2
  browser_engine: undetected_chromedriver
  warmup:
    enabled: true
    pages:
    - https://www.naver.com
    - https://blog.naver.com/{blog_id}
  schedule:
    time_jitter_minutes: 15
  parallel_image_workers: 3
seo:
  enabled: true
  auto_optimize: false
pricing:
  exchange_rate:
    krw_per_usd: 1520        # 수동 기본값 (설정 > 단가·환율에서 편집/자동갱신)
    source: manual           # manual | auto
    last_updated: '2026-06-13'
  text_models: {}            # 'engine/model': {input: USD/1M, output: USD/1M} — 비우면 코드 기본단가 사용
  image_models:              # USD/장. gpt_image는 사이즈·품질별, 그 외는 _flat
    gpt_image:
      '1024x1024': {low: 0.011, medium: 0.042, high: 0.167}
      '1536x1024': {low: 0.016, medium: 0.063, high: 0.25}
      '1024x1536': {low: 0.016, medium: 0.063, high: 0.25}
    gemini_image: {_flat: 0.04}
    flux_schnell: {_flat: 0.015}
    flux_pro: {_flat: 0.055}
    ideogram: {_flat: 0.04}
    gemini_flash_image: {_flat: 0.0}
    pollinations: {_flat: 0.0}
  projection:
    lookback_days: 7         # 예측용 일평균 산출 구간
    assumed_cost_per_post_krw: 400   # 실측 데이터 없을 때 수동 예측 단가
adb:
  path: C:\platform-tools\adb.exe
  airplane_on_wait: 8
  airplane_off_wait: 20
  ip_check_retries: 3
paths:
  image_dir: ./data/images
  attachment_dir: ./data/attachments
  cookie_dir: ./data/cookies
  chrome_profiles_dir: ./chrome_profiles
  log_dir: ./logs
products:
- name: 상품명예시
blog_accounts:
- blog_id: 블로그_예시
  name: ''
  naver_id: your_naver_id
  blog_url: ''
  cookie_path: ''
  status: 활성
  posts_today: 0
